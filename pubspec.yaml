name: planyr
description: "planyr — a weekly planner"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  enough_icalendar: ^0.17.0
  # IANA timezone database — needed to honor TZID parameters in
  # imported iCal events (DTSTART;TZID=America/New_York:…).
  timezone: ^0.10.0
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4

  # Auth & networking
  http: ^1.2.2
  amazon_cognito_identity_dart_2: ^3.8.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  fonts:
    - family: PatrickHand
      fonts:
        - asset: fonts/PatrickHand-Regular.ttf

flutter_launcher_icons:
  image_path: "assets/branding/planyr-icon-1024.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  # iOS 18+ dark/tinted icon variants. Both must be transparent —
  # iOS composites them onto its own dark gradient (dark mode) or
  # the user-selected tint color (tinted mode).
  image_path_ios_dark_transparent: "assets/branding/planyr-icon-ios-dark-1024.png"
  image_path_ios_tinted_grayscale: "assets/branding/planyr-icon-ios-tinted-1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/branding/planyr-icon-adaptive-foreground-1024.png"
  # Android 13+ "Themed icons" — same white-on-transparent silhouette
  # we use for iOS tinted. Launchers tint it to match system theme,
  # giving us proper dark-mode appearance when the user enables
  # "Themed icons" in Settings → Wallpaper & style.
  adaptive_icon_monochrome: "assets/branding/planyr-icon-ios-tinted-1024.png"
  web:
    generate: true
    image_path: "assets/branding/planyr-icon-1024.png"
    background_color: "#F5F0E8"
    theme_color: "#5B8A72"
  macos:
    generate: true
    image_path: "assets/branding/planyr-icon-macos-1024.png"
