name: alpha
description: "AlPHA - Alastair Planner & Habit App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  enough_icalendar: ^0.17.0
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4

  # Auth & networking
  http: ^1.2.2
  amazon_cognito_identity_dart_2: ^3.8.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  fonts:
    - family: PatrickHand
      fonts:
        - asset: fonts/PatrickHand-Regular.ttf
